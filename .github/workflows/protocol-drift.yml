name: Protocol Drift

# Fails fast if the in-tree `animus-plugin-protocol` or
# `animus-subject-protocol` crates diverge from the published
# `launchapp-dev/animus-protocol` crates. Plugin authors depend on the
# published crates, so any in-tree-only addition that hasn't yet shipped
# as a standalone release means plugins built against the published crates
# can send wire shapes the in-tree host won't understand — or vice versa.
#
# The job clones the standalone repo at the pinned tag, exports the paths
# to both `animus-plugin-protocol/src/lib.rs` and
# `animus-subject-protocol/src/lib.rs`, and runs the
# `crates/orchestrator-plugin-host/tests/protocol_drift.rs` integration
# tests. Those tests parse both crates with `syn`, extract their public
# surface, and panic if anything diverges that isn't on the test's
# `expected_in_tree_only` / `expected_drift` allowlists.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: protocol-drift-${{ github.ref }}
  cancel-in-progress: true

env:
  # GitHub Actions runner Node 20 -> Node 24 deprecation (effective 2026-06-02).
  # Forces JS-based actions onto Node 24 ahead of the cutover.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  drift:
    name: protocol drift check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CARGO_TERM_COLOR: always
      # Pinned tag for the published animus-plugin-protocol crate. Bump this
      # when a new standalone release ships; the in-tree crate is expected
      # to match the surface at this tag (modulo entries the test's
      # `expected_in_tree_only` allowlist documents as pending-release).
      STANDALONE_TAG: v0.1.13

    steps:
      - name: Checkout ao-cli (in-tree protocol)
        uses: actions/checkout@v4
        with:
          path: ao-cli

      - name: Checkout animus-protocol (standalone)
        uses: actions/checkout@v4
        with:
          repository: launchapp-dev/animus-protocol
          ref: ${{ env.STANDALONE_TAG }}
          path: animus-protocol

      - name: Verify standalone lib.rs files are present
        run: |
          set -euo pipefail
          STANDALONE_LIB="$GITHUB_WORKSPACE/animus-protocol/animus-plugin-protocol/src/lib.rs"
          if [ ! -f "$STANDALONE_LIB" ]; then
            echo "::error::standalone animus-plugin-protocol/src/lib.rs not found at $STANDALONE_LIB"
            exit 1
          fi
          echo "Resolved standalone plugin lib.rs at $STANDALONE_LIB"
          STANDALONE_SUBJECT_LIB="$GITHUB_WORKSPACE/animus-protocol/animus-subject-protocol/src/lib.rs"
          if [ ! -f "$STANDALONE_SUBJECT_LIB" ]; then
            echo "::error::standalone animus-subject-protocol/src/lib.rs not found at $STANDALONE_SUBJECT_LIB"
            exit 1
          fi
          echo "Resolved standalone subject lib.rs at $STANDALONE_SUBJECT_LIB"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ao-cli

      - name: Run protocol drift tests
        working-directory: ao-cli
        env:
          ANIMUS_STANDALONE_PROTOCOL_PATH: ${{ github.workspace }}/animus-protocol/animus-plugin-protocol/src/lib.rs
          ANIMUS_STANDALONE_SUBJECT_PATH: ${{ github.workspace }}/animus-protocol/animus-subject-protocol/src/lib.rs
        run: |
          cargo test --locked -p orchestrator-plugin-host --test protocol_drift -- --nocapture
