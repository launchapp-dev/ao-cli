name: Rust Workspace CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: rust-workspace-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # GitHub Actions runner Node 20 -> Node 24 deprecation (effective 2026-06-02).
  # Forces JS-based actions onto Node 24 ahead of the cutover.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rustfmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --locked

  cargo-check:
    name: cargo-check (${{ matrix.package }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        package:
          - protocol
          - orchestrator-cli
          - orchestrator-core
          - agent-runner
          - orchestrator-web-contracts
          - orchestrator-web-api
          - orchestrator-web-server
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check package
        run: cargo check --locked --all-targets -p ${{ matrix.package }}

  smoke-help:
    name: smoke-help
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: cargo-check
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Smoke test animus help
        run: cargo run --locked -p orchestrator-cli --bin animus -- --help
