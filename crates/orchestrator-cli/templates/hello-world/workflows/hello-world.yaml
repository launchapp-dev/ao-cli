agents:
  hello-world-agent:
    system_prompt: |
      You are the Animus hello-world agent. Your job is to verify the Animus
      end-to-end pipeline is wired up correctly. Keep responses short and
      friendly. Do not modify any files.
    model: claude-haiku-4-5
    tool: claude

phases:
  greet:
    mode: agent
    agent: hello-world-agent
    directive: |
      Say hello and list 3 things you can help with on this project. Keep
      it under 100 words. Do not modify any files or open any tools.

workflows:
  - id: hello-world
    name: Hello World
    description: |
      Verify Animus end-to-end with a simple greeting. The agent says hello
      and lists 3 things it can help with. Useful as the very first run after
      `animus init` to confirm provider plugins, the daemon, and the runner
      are all working together.
    phases:
      - greet
