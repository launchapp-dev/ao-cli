schema = "animus.pack.v1"
id = "animus.core-skills"
version = "0.1.0"
kind = "capability-pack"
title = "Core Skills"
description = "The bundled skill catalog (implementation, code-review, debugging, security-audit, ...) shipped as an installable pack. Auto-installs during animus init / animus setup."

[ownership]
mode = "bundled"

[compatibility]
animus_core = ">=0.1.0"
workflow_schema = "v2"
subject_schema = "v2"

[skills]
root = "skills"
# Aliases re-export YAML files under additional skill names so existing persona/task
# references remain valid. Each alias entry maps a new skill name to the YAML stem
# under [skills].root.
[skills.aliases]
testing = "unit-testing"
queue-management = "prioritization"
scheduling = "prioritization"
risk-management = "impact-analysis"
vision-alignment = "technical-writing"
requirements-management = "task-decomposition"
acceptance-criteria = "task-decomposition"
deliverable-validation = "code-review"
