schema = "animus.pack.v1"
id = "animus.review"
version = "0.1.0"
kind = "domain-pack"
title = "AO Review"
description = "Bundled first-party review and QA workflows."

[ownership]
mode = "bundled"

[compatibility]
ao_core = ">=0.1.0"
workflow_schema = "v2"
subject_schema = "v2"

[subjects]
kinds = ["animus.task"]
default_kind = "animus.task"

[workflows]
root = "workflows"
exports = ["animus.review/cycle"]

[runtime]
agent_overlay = "runtime/agent-runtime.overlay.yaml"

[permissions]
tools = ["animus", "cargo"]

[native_module]
feature = "plugin_ao_review"
module_id = "animus.review"
optional = true
