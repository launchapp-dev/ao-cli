schema = "animus.pack.v1"
id = "animus.customer-support"
version = "0.1.0"
kind = "domain-pack"
title = "Customer Support"
description = "First-party reference pack: autonomous tier-1 support triage. Classify incoming tickets, draft customer-facing replies, brief the human reviewer, flag for review."

[ownership]
# This pack lives in-tree as the first reference for non-coding use cases.
# It is loaded in "project" mode (copied/symlinked into a project's
# overlay), not bundled into the CLI binary.
mode = "project"

[compatibility]
ao_core = ">=0.4.0"
workflow_schema = "v2"
subject_schema = "v2"

[subjects]
# This pack composes against the `ticket` subject kind owned by an
# external backend plugin (animus-subject-markdown by default — Zendesk /
# Intercom / Front backends are planned).
kinds = ["ticket"]
default_kind = "ticket"

[workflows]
root = "workflows"
# The pack registry requires every exported workflow ref to be prefixed
# with the pack id. The YAML file declares the workflow with the same
# fully-qualified id so dispatch resolves correctly.
exports = [
  "animus.customer-support/triage-ticket",
]

[permissions]
# The triage workflow itself only needs to talk to Animus MCP to update
# subject status. It does not need shell, git, or filesystem tools.
tools = ["animus"]

# NOTE: Plugin prerequisites (animus-subject-markdown,
# animus-provider-claude) are NOT listed in [[dependencies]] — that
# section validates pack ids (lowercase letters/numbers/./-/_) and
# rejects GitHub-style plugin slugs that contain `/`. Plugin
# prerequisites are documented in README.md and installed by
# scripts/setup.sh via `animus plugin install ...`.
