schema = "animus.pack.v1"
id = "animus.ecommerce-fulfillment"
version = "0.1.0"
kind = "domain-pack"
title = "Ecommerce Fulfillment"
description = "First-party reference pack: autonomous tier-1 ecommerce order ops. Validate orders, run heuristic fraud screens, route fulfillment, draft customer notifications, and route returns/refunds — all reviewable before send."

[ownership]
# This pack lives in-tree as a reference for non-coding use cases.
# It is loaded in "project" mode (copied/symlinked into a project's
# overlay), not bundled into the CLI binary.
mode = "project"

[compatibility]
ao_core = ">=0.4.0"
workflow_schema = "v2"
subject_schema = "v2"

[subjects]
# This pack composes against the `order` subject kind owned by an
# external backend plugin (animus-subject-markdown by default — Shopify
# / WooCommerce / BigCommerce backends are planned).
kinds = ["order"]
default_kind = "order"

[workflows]
root = "workflows"
# Every exported workflow ref must be prefixed with the pack id. Each
# YAML file declares the workflow with the same fully-qualified id so
# dispatch resolves correctly.
exports = [
  "animus.ecommerce-fulfillment/process-order",
  "animus.ecommerce-fulfillment/handle-return",
]

[permissions]
# The workflows only talk to Animus MCP to update subject status and
# labels. They do not need shell, git, or filesystem tools.
tools = ["animus"]

# NOTE: Plugin prerequisites (animus-subject-markdown,
# animus-provider-claude) are NOT listed in [[dependencies]] — that
# section validates pack ids (lowercase letters/numbers/./-/_) and
# rejects GitHub-style plugin slugs that contain `/`. Plugin
# prerequisites are documented in README.md and installed by
# scripts/setup.sh via `animus plugin install ...`.
