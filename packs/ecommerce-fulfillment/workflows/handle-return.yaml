# Ecommerce Fulfillment: Handle Return Workflow
#
# Triggered when an existing order's status moves to `returned`. Four
# phases:
#   1. validate_return         — confirm the order is eligible for return
#                                (within return window, items returnable,
#                                 proof-of-return provided if required)
#   2. recommend_resolution    — choose refund vs exchange vs replacement
#                                and compute restocking impact
#   3. draft_return_message    — write the customer-facing return-
#                                acceptance message
#   4. flag_return_for_review  — set order status and labels so the ops
#                                team picks it up
#
# NOTE on phase ids: the workflow config compiler merges phase
# definitions across all loaded YAML files using a GLOBAL phase-id
# keyspace (see crates/orchestrator-config/src/workflow_config/
# yaml_compiler.rs::merge_yaml_into_config). Phase ids therefore must
# be unique across every YAML in `.animus/workflows/`. This file uses
# `flag_return_for_review` to avoid colliding with process-order's
# `flag_for_review`.
#
# Same 4-phase shape as process-order's tail, but the inputs are
# different — the validator looks at return eligibility, the
# resolution recommender looks at item condition + cost, and the
# notification framing apologizes / sets expectations rather than
# confirms.

agents:
  return-validator:
    description: |
      Cheap, fast return-eligibility checker. Reads a returned-order
      record and returns a JSON verdict on whether the return is
      eligible to process.
    system_prompt: |
      You are an ecommerce return validator. Your only job is to read
      one returned-order record and return a structured JSON verdict
      on whether the return is eligible to process.

      Check for:
        - order_id present and order is in `returned` status
        - return is within the documented return window (default 30
          days from delivery — if the dispatch envelope provides a
          custom policy, prefer that)
        - line_items being returned are flagged returnable (digital
          downloads, final-sale, and customized items typically are
          NOT returnable — call this out as an issue if present)
        - return reason is provided (defect, wrong-item, no-longer-
          wanted, damaged-in-transit, other)
        - proof-of-return present when required (RMA number, carrier
          tracking back to the warehouse, or photos for damaged-in-
          transit)

      Return ONLY a JSON object. No prose.
    model: claude-haiku-4-5
    tool: claude

  resolution-recommender:
    description: |
      Stronger model. Picks refund vs exchange vs replacement and
      computes restocking impact.
    system_prompt: |
      You are a returns-resolution recommender. Given a validated
      return, pick the resolution and explain the tradeoff in one
      sentence.

      Resolutions:
        - refund      — return funds to the original payment method;
                        default for no-longer-wanted, wrong-size when
                        out of replacement stock, and any return
                        outside the exchange window
        - exchange    — ship a different SKU (different size, color,
                        configuration) in lieu of refund; only when
                        the replacement is in stock at the same or
                        lower price
        - replacement — ship the same SKU again; default for damaged-
                        in-transit and defect cases where the original
                        unit is being replaced rather than swapped
        - store_credit — issue store credit (typically 110% of refund
                        value as a goodwill bump); use when the
                        customer requests credit OR when the refund
                        is outside policy but the company wants to
                        retain the customer

      Also compute restocking impact:
        - restockable    — item returns to sellable inventory
        - refurbish      — item returns to refurb pool (lightly used)
        - destroy        — item cannot be resold (hygiene items,
                            damaged beyond repair, opened software)

      Return ONLY a JSON object. No prose.
    model: claude-sonnet-4-6
    tool: claude

  return-notification-drafter:
    description: |
      Stronger model. Drafts the return-acceptance message in a tone
      that acknowledges the friction and sets clear next-step
      expectations.
    system_prompt: |
      You are a senior ecommerce returns specialist. You draft return-
      acceptance messages that are warm, specific, and accountable.
      Never invent facts about restocking timelines, refund timing, or
      replacement stock. If a fact is uncertain, say so and tell the
      customer the next step.

      Tone always: acknowledge the friction first ("Thanks for
      letting us know — sorry this didn't work out"), then state the
      resolution concretely, then set expectations on timing.

      Resolution framing:
        - refund      — state refund amount + method + expected
                        timing (e.g. 3-5 business days back to card)
        - exchange    — state the replacement SKU + when it will
                        ship + any price difference handling
        - replacement — state the replacement is in motion, when it
                        will ship, and how the original return is
                        handled
        - store_credit — state credit amount + how/when it'll appear
                        in the account

      Output: a complete reply ready for a human reviewer to approve
      and send. Sign as "the $store team" — do not invent a person's
      name.
    model: claude-sonnet-4-6
    tool: claude

  returns-ops-handoff:
    description: |
      Concise summarizer. Reads the return-validation, resolution
      recommendation, and draft message and produces a reviewer
      brief.
    system_prompt: |
      You are the returns ops-handoff coordinator. Given a validated
      return, a resolution recommendation, and a draft message,
      produce a short brief for the human reviewer:

      - 1-sentence TL;DR (which order, which items, which resolution)
      - 1-sentence summary of what the draft message commits to
      - Up to 3 suggested checks the reviewer should consider (e.g.
        "confirm RMA matches what was received", "verify replacement
        SKU in stock before promising ship date")
      - Recommend: send-as-is | minor-edit | hold-for-manager-review
        | escalate-to-ops

      Keep it under 120 words total. The reviewer is busy.
    model: claude-haiku-4-5
    tool: claude

phases:
  validate_return:
    mode: agent
    agent: return-validator
    directive: |
      Read the returned-order record in your subject. Return a JSON
      validation verdict: { "ok": bool, "issues": [string, ...] }.
      Each issue should be a short, actionable string (e.g. "outside
      30-day return window — 47 days since delivery", "line item
      SKU-7821 is final-sale, not returnable").
    output_contract:
      kind: phase_result
      required_fields:
        - ok
        - issues
      fields:
        ok:
          type: boolean
          description: True only if return is within policy and all returned items are eligible.
        issues:
          type: array
          description: Short, actionable issue strings; empty array if ok=true.
          items:
            type: string
    decision_contract:
      min_confidence: 0.6
      max_risk: low
      allow_missing_decision: false

  recommend_resolution:
    mode: agent
    agent: resolution-recommender
    directive: |
      Pick the resolution (refund | exchange | replacement |
      store_credit) and the restocking impact (restockable | refurbish
      | destroy) for this return. Use the validator output for
      eligibility and the order's line_items + return reason to
      decide. Return JSON.
    output_contract:
      kind: phase_result
      required_fields:
        - resolution
        - restocking_impact
      fields:
        resolution:
          type: string
          description: One of refund, exchange, replacement, store_credit.
        restocking_impact:
          type: string
          description: One of restockable, refurbish, destroy.
        rationale:
          type: string
          description: One-sentence justification for the resolution + restocking choice.
        refund_amount:
          type: string
          description: Refund or store-credit amount, formatted as currency string (e.g. "$129.00"). Empty for exchange/replacement.
    decision_contract:
      min_confidence: 0.6
      max_risk: medium
      allow_missing_decision: false

  draft_return_message:
    mode: agent
    agent: return-notification-drafter
    directive: |
      Draft a customer-facing return-acceptance message for this
      order. Use the channel from the order subject to pick tone, and
      the resolution + restocking impact from prior phases to frame
      expectations. Do NOT send the message — output it as the phase
      result for a human reviewer.
    output_contract:
      kind: phase_result
      required_fields:
        - draft_message
      fields:
        draft_message:
          type: string
          description: The full customer-facing return-acceptance message, ready to send after human approval.
        assumptions:
          type: array
          description: Facts about stock, refund timing, or account state the draft assumes; reviewer must verify.
          items:
            type: string
    decision_contract:
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false

  flag_return_for_review:
    mode: agent
    agent: returns-ops-handoff
    directive: |
      Mark the returned order for the ops team's resolution queue.
      Set status=blocked and add the label
      `return-resolution-pending`, plus a per-resolution label so the
      queue can be filtered:

        - resolution=refund        → label `return-refund-pending`
        - resolution=exchange      → label `return-exchange-pending`
        - resolution=replacement   → label `return-replacement-pending`
        - resolution=store_credit  → label `return-store-credit-pending`

      The Animus subject protocol only accepts the normalized
      statuses `ready`, `in-progress`, `blocked`, `done`, or
      `cancelled`. Use labels for the resolution-specific routing.

      Use the Animus MCP tools (the agent runtime allows `animus.*`
      calls but typically does not allow free-form shell).

      IMPORTANT: As with process-order.yaml, when subject.id is a
      custom title rather than a backend-qualified order id, SKIP the
      mutating MCP calls and emit a verdict noting it. Treat the id as
      valid only when ALL are true:
        - No whitespace
        - No colon-space
        - Matches `^ORD-\d+$` or `^order:[\w.-]+$`

      When proceeding:
        1. `animus.subject.get` { kind: "order", id: <id> } — read
           existing labels.
        2. `animus.subject.status` { kind: "order", id: <id>,
           status: "blocked" }.
        3. `animus.subject.update` { kind: "order", id: <id>,
           labels: [...existing_labels, "return-resolution-pending",
           <per-resolution label>] } (deduplicate).

      Emit a short verdict confirming the status + labels change.
    capabilities:
      mutates_state: true
    decision_contract:
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false

workflows:
  - id: animus.ecommerce-fulfillment/handle-return
    name: Handle Ecommerce Return
    description: |
      End-to-end return-handling: validate eligibility, recommend
      refund vs exchange vs replacement vs store credit, draft a
      customer-facing return-acceptance message, and flag the order
      for the ops team's resolution queue. The reviewer triggers the
      actual refund/restock action from the payments + WMS systems.
    phases:
      - validate_return
      - recommend_resolution
      - draft_return_message
      - flag_return_for_review
