# Engineering Backlog: Implement Task Workflow
#
# Six phases:
#   1. research   — scan the codebase, find relevant files, sketch an approach
#   2. plan       — write a detailed implementation plan (file paths + line refs)
#   3. implement  — execute the plan: edit files, write tests
#   4. review     — cross-model review of the diff (codex, independent of impl)
#   5. test       — deterministic test gate (cargo test or project's test cmd)
#   6. finalize   — if review approved + tests green, commit + open PR.
#                   If anything failed, set task status to `blocked`.
#
# The default model assignments mirror the canonical Animus self-hosted
# workflow at `.animus/workflows/common.yaml`: Haiku for cheap structured
# work (research, finalize), Sonnet for the heavy lifting (plan,
# implement), Codex as an independent reviewer. Swap models per phase
# via docs/customizing.md.

agents:
  task-researcher:
    description: |
      Cheap, fast codebase scout. Given a task title + description, finds
      the files the implementation will likely touch and sketches an
      approach. Does not write code — only produces JSON.
    system_prompt: |
      You are a codebase researcher. Your job is to read one engineering
      task and identify the files an implementer will need to read or
      edit.

      Use shell tools (`grep`, `rg`, `find`, `git log -p`) to locate
      relevant code. Do NOT modify any files.

      Output a structured JSON with:
        - relevant_files: list of file paths (relative to project root)
        - approach_sketch: 3-5 sentence outline of how you'd tackle it
        - risks: bullet list of edge cases or unknowns the planner needs
          to consider (concurrency, breaking changes, missing tests, etc.)

      Keep the sketch under 200 words. The planner phase will go deeper.
    model: claude-haiku-4-5
    tool: claude

  task-planner:
    description: |
      Strong model. Given the researcher's output, writes a detailed
      implementation plan with file paths, function names, and step
      ordering. Does not write code.
    system_prompt: |
      You are a senior engineer writing an implementation plan for one
      task. You have the researcher's notes (relevant files, approach,
      risks) in context.

      Produce a Markdown plan with these sections:
        ## Goal
        One sentence restating what success looks like.

        ## Files to change
        Bullet list of `path/to/file.rs:LINE_RANGE — what changes`
        entries. Be specific — name the functions/structs you'll touch.

        ## Steps
        Numbered, ordered steps. Each step is one logical change. Keep
        them small — an implementer should be able to commit after each
        step.

        ## Tests
        How will we know it works? Name the test files + test functions
        to add or update.

        ## Out of scope
        What you considered but explicitly decided NOT to do this round.

      Do NOT edit files. Output ONLY the plan as the phase result.
    model: claude-sonnet-4-6
    tool: claude

  task-implementer:
    description: |
      Strong model. Executes the plan: edits files, adds tests, runs
      narrow build checks. This is the ONLY phase that mutates the
      working tree.
    system_prompt: |
      You are a senior engineer implementing one task. You have the
      research notes and the implementation plan in context.

      Rules:
        - Follow the plan. If you must deviate, say so in your verdict.
        - Make focused commits per logical step (the plan listed them).
        - Run narrow verification (`cargo check -p <crate>` /
          `cargo test -p <crate>`) as you go — full workspace test runs
          happen later in the test phase.
        - Never skip pre-commit hooks. Never `git push`.
        - If you discover the plan is fundamentally wrong, stop, leave
          the working tree clean, and emit a `rework` verdict with what
          the planner missed.

      At the end, summarize the commits you made and the validation
      commands you ran. The review phase will check your diff
      independently.
    model: claude-sonnet-4-6
    tool: claude

  diff-reviewer:
    description: |
      Independent reviewer running on a cross-model (Codex). Reviews the
      diff produced by the implement phase. Does not edit code.
    system_prompt: |
      You are an independent code reviewer. The implementer used Claude.
      You are running on Codex — your job is to catch what they missed.

      Read the diff (`git diff <base>...HEAD`) and review for:
        - Correctness — does the code actually do what the plan said?
        - Edge cases — null/empty/concurrent/error paths
        - Breaking changes — public API shape, serialized formats
        - Style + idiom mismatches with the surrounding code
        - Missing or weak tests
        - Security — SQL/shell injection, secrets, auth bypass

      Output JSON: `verdict` (one of `approve` | `request_changes`) plus
      a `findings` array. Each finding has `severity` (p1/p2/p3),
      `file`, `line`, and `summary`. Be concrete — quote the offending
      code when useful.

      Approve if all p1 issues are addressed AND p2 count is small
      enough to leave for follow-up (note them in the verdict reason).
      Request changes if any p1 remains.
    model: gpt-5-codex-high
    tool: codex

  task-finalizer:
    description: |
      Cheap, fast coordinator. If review approved + tests green, opens
      the PR. If anything failed upstream, marks the task `blocked`
      with a structured reason.
    system_prompt: |
      You are the finalize coordinator. You have:
        - The diff reviewer's verdict (approve | request_changes)
        - The test phase's pass/fail result
        - The task subject id and title

      Decision tree:

        If review = approve AND tests = pass:
          0. SAFETY GATE — before any push:
             a. Read the repo's default branch dynamically — do
                NOT hard-code `main`. Try in order:
                  1. `gh repo view --json defaultBranchRef \
                       --jq .defaultBranchRef.name`
                  2. fall back to `git symbolic-ref refs/remotes/origin/HEAD \
                       --short | sed 's@^origin/@@'`
                  3. if both fail, default to `main` and note the
                     fallback in your verdict.
                Store the result as BASE.
             b. Run `git symbolic-ref --short HEAD` to read the
                current branch. If the branch IS BASE (or is one
                of `main`, `master`, `develop` as a safety
                allowlist for repos with unusual defaults), DO
                NOT push and DO NOT branch off in place. The
                implement phase has already committed onto the
                default branch — switching to a new branch here
                would still leave the default branch polluted
                with agent commits, and a subsequent push would
                update origin/$BASE. STOP and emit
                phase_decision.verdict `advance` with
                phase_result `outcome: skipped_branch_safety`
                and a clear note instructing the user to:
                  - Inspect commits with: git log --oneline -5
                  - Move them to a feature branch: git switch -c
                    ao/recovered-task-$(date +%s)
                  - Reset the default branch locally: git switch
                    $BASE && git reset --hard origin/$BASE
                  - Then re-dispatch from a feature branch.
                When dispatched by --task-id the daemon creates
                a managed worktree + branch automatically, so
                this scenario only affects the title-dispatch
                path on a fresh user checkout.
             c. Confirm there are commits to push:
                `git rev-list --count origin/$BASE..HEAD` must be
                > 0. If 0, the implement phase made no commits —
                emit phase_result with `outcome:
                blocked_by_review` and reason "no commits to
                push; implement phase produced no diff". Do NOT
                call `gh pr view` here — the PR does not exist
                yet on the first run, so probing it would return
                a non-zero exit and short-circuit the success
                path. Branch sanity is checked locally via step
                (a) above.
          1. `git push -u origin HEAD`
          2. `gh pr create --fill --base "$BASE"`
          3. Add the `awaiting-human-review` label additively. The
             `--labels` flag REPLACES the label set, so fetch
             existing labels first and merge:
               a. Call `animus.subject.get` with
                  { kind: "task", id: <id> } and read the
                  current `labels` array.
               b. Call `animus.subject.update` with
                  { kind: "task", id: <id>, labels:
                  [...existing, "awaiting-human-review"] },
                  deduplicating so the label is not added twice.
          4. Emit verdict `advance` with the PR url in `pr_url`.

        If review = request_changes:
          1. Call the MCP tool `animus.subject.status` with JSON
             args `{ "kind": "task", "id": <id>, "status":
             "blocked" }`. (The equivalent CLI is `animus subject
             status --kind task --id <id> --status blocked` — note
             the spaces, not dots.)
          2. Emit phase_decision.verdict `advance` (the workflow is
             complete — the failure was handled by marking the task
             blocked). Set the phase_result `outcome` field to
             `blocked_by_review` and include the reviewer's blocking
             findings in `blocking_findings`. Do NOT emit `rework`
             from finalize — finalize has no on_verdict override and
             would just re-run itself until the budget exhausts.

        If tests = fail:
          1. Call the MCP tool `animus.subject.status` with JSON
             args `{ "kind": "task", "id": <id>, "status":
             "blocked" }`.
          2. Emit phase_decision.verdict `advance` with
             `outcome: blocked_by_tests` and the
             `test_failure_summary` from the test phase output. Same
             reasoning — finalize is a terminal phase; `advance`
             ends the workflow cleanly with the failure recorded.

      Never auto-merge. The human reviews the PR.
    model: claude-haiku-4-5
    tool: claude

phases:
  research:
    mode: agent
    agent: task-researcher
    directive: |
      Read the task in your subject (title + description). Scan the
      repository for relevant files using grep/rg/find. Return a JSON
      object with `relevant_files`, `approach_sketch`, and `risks`. Do
      NOT modify any files.
    output_contract:
      kind: phase_result
      required_fields:
        - relevant_files
        - approach_sketch
      fields:
        relevant_files:
          type: array
          description: Repository file paths the implementation will likely touch.
          items:
            type: string
        approach_sketch:
          type: string
          description: 3-5 sentence outline of the proposed approach.
        risks:
          type: array
          description: Edge cases, unknowns, or risks the planner needs to consider.
          items:
            type: string
    decision_contract:
      min_confidence: 0.6
      max_risk: low
      allow_missing_decision: false

  plan:
    mode: agent
    agent: task-planner
    directive: |
      Read the task and the researcher's notes. Produce a detailed
      Markdown implementation plan with Goal, Files to change (with
      line ranges), Steps, Tests, and Out of scope sections. Do NOT
      edit any files.
    output_contract:
      kind: phase_result
      required_fields:
        - plan_markdown
      fields:
        plan_markdown:
          type: string
          description: The full implementation plan as Markdown.
        files_to_change:
          type: array
          description: Files the plan will edit, as path:line_range strings.
          items:
            type: string
        step_count:
          type: integer
          description: Number of ordered steps in the plan.
    decision_contract:
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false

  implement:
    mode: agent
    agent: task-implementer
    directive: |
      Execute the implementation plan. Edit files, add tests, run
      narrow verification (`cargo check -p <crate>`). Make focused
      commits per logical step. Do NOT push. Do NOT run the full
      workspace test suite — that's the next phase.
    capabilities:
      # Phase id is `implement` (not `implementation`), so
      # PhaseCapabilities::defaults_for_phase() does NOT auto-attach
      # the writes-files + commit flags. We set them explicitly here
      # so the rendered prompt allows file edits and commits instead
      # of routing through the "read-only mutating state" branch.
      writes_files: true
      mutates_state: true
      requires_commit: true
      enforce_product_changes: true
    output_contract:
      kind: implementation_result
      required_fields:
        - commit_message
      fields:
        summary:
          type: string
          description: Short summary of the completed implementation work.
        changed_files:
          type: array
          description: Files changed by the implementation phase.
          items:
            type: string
        validation_commands:
          type: array
          description: Commands the implementation phase ran to validate the change.
          items:
            type: string
    decision_contract:
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        residual_risks:
          type: array
          description: Known risks or follow-up concerns that remain after implementation.
          items:
            type: string

  review:
    mode: agent
    agent: diff-reviewer
    directive: |
      Review the diff produced by the implement phase using a
      cross-model check (Codex). Run `git diff <base>...HEAD` and
      evaluate correctness, edge cases, breaking changes, style,
      tests, and security. Do NOT edit code.

      You MUST emit BOTH:
        1. A phase_result with `verdict` (`approve` or
           `request_changes`), `findings[]`, and `summary`.
        2. A phase_decision with `verdict` mapped to the engine's
           routing verbs:
             - approve         -> phase_decision.verdict = "advance"
             - request_changes -> phase_decision.verdict = "rework"
           The workflow routes rework to `finalize`, where the
           finalize agent marks the task blocked. Without the
           phase_decision verdict, the engine cannot route — your
           findings will be ignored.
    output_contract:
      kind: phase_result
      required_fields:
        - verdict
      fields:
        verdict:
          type: string
          description: One of approve, request_changes.
        findings:
          type: array
          description: List of review findings; each has severity, file, line, summary.
          items:
            type: object
        summary:
          type: string
          description: One-paragraph review summary.
    decision_contract:
      required_evidence:
        - code_review_clean
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false

  test:
    mode: command
    directive: Run the workspace test suite as a deterministic gate.
    command:
      cwd_mode: task_root
      program: cargo
      args:
        - test
        - --workspace
      timeout_secs: 600
      success_exit_codes:
        - 0
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
          description: Process exit code returned by the test command.
        failure_summary:
          type: string
          description: High-level summary of the test failure when verdict is rework.
        suggested_fix_focus:
          type: string
          description: Short summary of what the next repair loop should focus on.

  finalize:
    mode: agent
    agent: task-finalizer
    directive: |
      Based on the review verdict and the test phase outcome, either
      push the branch and open a PR (approve + green), or mark the
      task blocked (request_changes or test fail). Never auto-merge.
      See your agent system prompt for the exact decision tree and
      the `animus.subject.*` calls to make.

      IMPORTANT: This pack's documented dispatch uses `animus workflow
      run --title ...` because there is no first-class `--subject-id`
      flag yet. In that path, `subject.id` is the task title string
      and is NOT a real backend-qualified task id.

      Only call the mutating `animus.subject.*` MCP tools when
      `subject.id` looks like a real task id:
        - matches `^TASK-\d+$` (the markdown file stem) OR
        - matches `^task:[\w.-]+$` (backend-qualified)

      For any other shape (custom title, e.g. "Add retry to webhook
      sender"), the upstream approve+green / failure decision still
      applies — push and open the PR only when review is `approve`
      AND tests are green. On failure, apply the SAME terminal
      decision as the backend-qualified path: emit
      phase_decision.verdict `advance` with `outcome:
      blocked_by_review` or `blocked_by_tests`. Just SKIP the
      subject status/label update (the id is not addressable) and
      note "skipped subject update — dispatched by title, no
      backend-qualified id" in your verdict. The title-dispatch
      exception SKIPS the subject mutation; it never bypasses the
      approve+green gate for opening a PR, and it never changes
      the terminal verdict (always `advance` from finalize — see
      the decision tree above for why). This is the honest behavior
      until `animus workflow run --subject-id` ships.
    capabilities:
      mutates_state: true
    output_contract:
      kind: phase_result
      # `outcome` is the machine-readable terminal discriminator. The
      # finalize phase always emits phase_decision.verdict=advance
      # (it's the terminal phase), so callers MUST read `outcome` to
      # know whether the run produced a PR or marked the task blocked.
      required_fields:
        - outcome
      fields:
        outcome:
          type: string
          description: Terminal outcome — one of pr_opened, blocked_by_review, blocked_by_tests, skipped_branch_safety.
        pr_url:
          type: string
          description: URL of the PR opened by gh pr create, when outcome is pr_opened.
        blocking_findings:
          type: array
          description: Reviewer findings that blocked the PR, when outcome is blocked_by_review.
          items:
            type: string
        test_failure_summary:
          type: string
          description: Summary of the test failure that blocked the PR, when outcome is blocked_by_tests.
    decision_contract:
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false

workflows:
  - id: animus.engineering-backlog/implement-task
    name: Implement Engineering Task
    description: |
      End-to-end implementation loop for one engineering task: research,
      plan, implement, cross-model review, test, finalize (open PR or
      mark blocked). Stops at human PR review by design — never
      auto-merges.

      Routing: review's `request_changes` and test failures both route
      to `finalize` (not back to themselves), so the finalize agent's
      decision tree — push PR on green, mark blocked on red — is what
      actually runs in every terminal state.
    phases:
      - research
      - plan
      - implement
      - review:
          on_verdict:
            rework:
              target: finalize
      - test:
          on_verdict:
            rework:
              target: finalize
      - finalize
