schema = "animus.pack.v1"
id = "animus.organization-meetings"
version = "0.1.0"
kind = "domain-pack"
title = "Organization Meetings"
description = "First-party reference pack: meeting ops automation. Prep agendas before the call, extract action items from notes, draft followup emails, roll the week up into a status summary, and gate every send on a human reviewer."

[ownership]
# Loaded in "project" mode (copied/symlinked into a project's overlay),
# not bundled into the CLI binary.
mode = "project"

[compatibility]
ao_core = ">=0.4.0"
workflow_schema = "v2"
subject_schema = "v2"

[subjects]
# This pack composes against the `meeting` subject kind owned by an
# external backend plugin (animus-subject-markdown by default — a
# calendar-aware backend such as a Google Calendar or Outlook plugin
# is the natural upgrade path).
kinds = ["meeting"]
default_kind = "meeting"

[workflows]
root = "workflows"
# The pack registry requires every exported workflow ref to be prefixed
# with the pack id. Each YAML file declares the workflow with the same
# fully-qualified id so dispatch resolves correctly.
exports = [
  "animus.organization-meetings/prep-and-followup",
  "animus.organization-meetings/weekly-status",
]

[permissions]
# The workflows talk to Animus MCP to read meeting subjects and update
# their status. They do not need shell, git, or filesystem tools.
tools = ["animus"]

# NOTE: Plugin prerequisites (animus-subject-markdown,
# animus-provider-claude) are NOT listed in [[dependencies]] — that
# section validates pack ids (lowercase letters/numbers/./-/_) and
# rejects GitHub-style plugin slugs that contain `/`. Plugin
# prerequisites are documented in README.md and installed by
# scripts/setup.sh via `animus plugin install ...`.
