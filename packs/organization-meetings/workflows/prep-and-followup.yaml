# Organization Meetings: Per-meeting Prep + Followup Workflow
#
# Five phases:
#   1. pre_brief        — draft a 1-page prep doc from meeting metadata and
#                          prior context with each attendee
#   2. extract_actions  — parse raw notes into structured action items
#                          { owner, action, due, priority, source_quote }
#   3. draft_followup   — write a followup email summarizing decisions,
#                          next steps, and open questions
#   4. synthesize_weekly — (per-meeting contribution) condense this meeting
#                          into a 3-bullet weekly-status entry
#   5. meeting_flag_for_review  — set meeting subject status to blocked + label it
#                          awaiting-human-review until the user signs off
#
# The default model assignments use Claude Sonnet for every prose phase.
# Swap to OpenAI or Gemini by changing the `model` and `tool` fields on
# each agent — see docs/customizing.md.

agents:
  meeting-prep:
    description: |
      Drafts a 1-page meeting brief. Reads the meeting subject (title,
      attendees, scheduled_at, type, prior_context) and produces objectives,
      per-attendee recent context, talking points, and risks.
    system_prompt: |
      You are an executive assistant who preps the principal for every
      meeting. You produce a single-page brief that the principal can read
      in under two minutes.

      Brief shape (in order):
        - objectives          — 2-4 outcomes the principal wants from the call
        - per-attendee context — for each attendee, 1-2 lines on recent
                                 history, current asks, and known sensitivities
        - talking points      — ordered list, most-important first
        - risks               — 1-3 things that could go wrong, with how
                                 to defuse each

      Tone by meeting type:
        - 1:1       — coaching, growth-oriented, candid
        - staff     — strategic, decision-forcing, time-boxed
        - external  — value-forward, customer-language, no internal jargon
        - interview — structured rubric, calibrate to role bar
        - vendor    — diligence-mode, decision criteria explicit

      Never invent attendee facts. If prior_context is empty, say so and
      list the open questions the principal should ask to fill the gap.
    model: claude-sonnet-4-6
    tool: claude

  action-extractor:
    description: |
      Reads raw meeting notes and extracts a structured list of action
      items. Conservative: only emits an action when an owner and a verb
      are clearly identifiable in the notes.
    system_prompt: |
      You are a meeting action-item extractor. Your only job is to read
      raw meeting notes and return the extracted actions as a phase
      result.

      Output a JSON object with this shape:
        {
          "kind": "phase_result",
          "actions": [
            {
              "owner":        "<name or handle from the notes>",
              "action":       "<verb-led sentence, present tense>",
              "due":          "<ISO date if stated, else null>",
              "priority":     "high | med | low",
              "source_quote": "<exact substring from the notes that grounds this>"
            }
          ]
        }

      Rules:
        - If owner is ambiguous, set owner to "unassigned" and downgrade
          priority by one step.
        - If due date is not stated, set due to null. Do not guess.
        - Priority defaults to "med" unless the notes use language like
          "urgent", "blocker", "before $deadline" (→ high) or "nice to
          have", "someday", "if we get to it" (→ low).
        - source_quote MUST be a verbatim substring of the input notes.
        - If there are no detectable actions, return { "kind":
          "phase_result", "actions": [] }.
        - Return ONLY the JSON object. No prose, no markdown fence.
    model: claude-sonnet-4-6
    tool: claude

  followup-drafter:
    description: |
      Drafts the post-meeting followup email. Summarizes decisions made,
      next steps with owners, and open questions. Output is ready for the
      principal to review and send.
    system_prompt: |
      You are a chief of staff drafting the followup email after a
      meeting. The email goes to everyone who attended.

      Email shape:
        - Subject:  short, action-oriented
        - Greeting: warm, brief
        - Decisions: bulleted list of what was decided, with who/why
        - Next steps: bulleted list of (owner, action, due) — pulled from
                      the extract_actions phase output
        - Open questions: 1-3 things still unresolved, with proposed owner
        - Close: short, no flourish; sign as the principal

      Hard rules:
        - Never invent decisions that are not in the notes or extracted
          actions. If something was discussed but not decided, put it in
          open questions, not decisions.
        - Do not include the source_quote field from extracted actions —
          rephrase in the principal's voice.
        - Keep the email under 250 words.
    model: claude-sonnet-4-6
    tool: claude

  weekly-synthesizer:
    description: |
      Condenses a single meeting into a 3-bullet entry that can be
      aggregated into the weekly status doc. Used by both this per-meeting
      workflow (so each meeting contributes incrementally) and the
      standalone weekly-status workflow (which reads the contributions).
    system_prompt: |
      You write the weekly-status entry for one meeting. Output a single
      JSON object with this shape:

        {
          "kind": "phase_result",
          "decisions": "<one phrase: what was decided, or \"none\">",
          "blockers":  "<one phrase: what blockers were raised, or \"none\">",
          "theme":     "<one phrase: the underlying theme (e.g. \"pricing pushback\", \"team morale\", \"scope creep\")>"
        }

      Each value is at most 12 words. No padding, no caveats. Return
      ONLY the JSON object — no prose, no markdown fence.
    model: claude-sonnet-4-6
    tool: claude

  review-gate:
    description: |
      Flips the meeting subject status to blocked and adds the
      awaiting-human-review label until the principal signs off on the
      followup email.
    system_prompt: |
      You are the human-review gate. Given a meeting subject id, your job
      is to flip its status to `blocked` and add a label so it surfaces in
      the principal's review inbox. You do not draft, summarize, or
      extract — those phases already ran.
    model: claude-haiku-4-5
    tool: claude

phases:
  pre_brief:
    mode: agent
    agent: meeting-prep
    directive: |
      Read the meeting subject (title, attendees, scheduled_at, type,
      prior_context). Produce the 1-page brief. If prior_context is empty
      or thin, say so and list the questions the principal should ask
      themselves before the call.
    output_contract:
      kind: phase_result
      required_fields:
        - objectives
        - talking_points
      fields:
        objectives:
          type: array
          description: 2-4 outcomes the principal wants from this meeting.
          items:
            type: string
        per_attendee_context:
          type: array
          description: For each attendee, a short note on recent context and current asks.
          items:
            type: string
        talking_points:
          type: array
          description: Ordered list of talking points, most-important first.
          items:
            type: string
        risks:
          type: array
          description: 1-3 risks for the meeting and how to defuse each.
          items:
            type: string
    decision_contract:
      min_confidence: 0.6
      max_risk: low
      allow_missing_decision: false

  extract_actions:
    mode: agent
    agent: action-extractor
    directive: |
      Read the raw notes attached to the meeting subject (the body, or a
      `notes` field, or whatever the dispatch envelope carries). Return
      a phase_result JSON object with an `actions` array, one entry per
      detected commitment. If there are no actions, return an empty
      array — do not fabricate.
    output_contract:
      kind: phase_result
      required_fields:
        - actions
      fields:
        actions:
          type: array
          description: Structured action items extracted from the notes.
          items:
            type: object
    decision_contract:
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false

  draft_followup:
    mode: agent
    agent: followup-drafter
    directive: |
      Read the extracted action items from the previous phase and the
      meeting notes. Draft the followup email. Do NOT send — emit the
      complete email body as the phase result.
    output_contract:
      kind: phase_result
      required_fields:
        - subject
        - body
      fields:
        subject:
          type: string
          description: Email subject line.
        body:
          type: string
          description: Complete email body, ready for the principal to send after review.
        open_questions:
          type: array
          description: Unresolved items that the principal may want to chase up separately.
          items:
            type: string
    decision_contract:
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false

  synthesize_weekly:
    mode: agent
    agent: weekly-synthesizer
    directive: |
      Condense this meeting into the weekly-status entry: decisions,
      blockers, theme — emitted as a phase_result JSON object (three
      string fields, one phrase each). This entry is what the
      weekly-status rollup workflow aggregates across all meetings in
      the week.
    output_contract:
      kind: phase_result
      required_fields:
        - decisions
        - blockers
        - theme
      fields:
        decisions:
          type: string
          description: One phrase summarizing decisions made, or "none".
        blockers:
          type: string
          description: One phrase summarizing blockers raised, or "none".
        theme:
          type: string
          description: One phrase capturing the underlying theme.
    decision_contract:
      min_confidence: 0.6
      max_risk: low
      allow_missing_decision: false

  meeting_flag_for_review:
    mode: agent
    agent: review-gate
    directive: |
      Mark the meeting as awaiting human sign-off on the followup. The
      Animus subject protocol only accepts the normalized statuses
      `ready`, `in-progress`, `blocked`, `done`, or `cancelled` — there
      is no free-form `awaiting_review` value. Use `blocked` to indicate
      the meeting is waiting on the principal, and add an
      `awaiting-human-review` label via the Animus MCP update call.

      IMPORTANT: this pack's documented dry-run dispatches workflows via
      `animus workflow run --title ...` because there is no first-class
      `--subject-id` flag yet. In that path, `subject.id` is the meeting
      title string (e.g. "MTG-2001: 1:1 with Priya") and is NOT a
      backend-qualified meeting id.

      Only proceed with mutating MCP calls when `subject.id` is an
      EXACT backend-qualified meeting id. Concretely, treat the subject
      id as valid only when ALL are true:
        - It contains NO whitespace
        - It contains NO colon followed by a space (excludes titles
          like "MTG-2001: 1:1 with Priya")
        - It matches one of these shapes:
            * `^MTG-\d+$` (e.g. "MTG-2001", the markdown file stem)
            * `^meeting:[\w.-]+$` (backend-qualified)

      For any other shape, SKIP the mutating calls and emit a verdict
      noting "subject id is a custom title or unrecognized shape, not a
      backend meeting id — flag step skipped".

      When proceeding, fetch the meeting first so the label update is
      additive rather than a destructive replace:

        1. Call `animus.subject.get` with { kind: "meeting", id: <id> }
           and read the existing labels.
        2. Call `animus.subject.status` with { kind: "meeting", id: <id>,
           status: "blocked" }.
        3. Call `animus.subject.update` with { kind: "meeting", id: <id>,
           labels: [...existing_labels, "awaiting-human-review"] }
           (deduplicate so the label is not added twice).

      Emit a short verdict confirming the status change (or the skip).
    capabilities:
      mutates_state: true
    decision_contract:
      min_confidence: 0.7
      max_risk: low
      allow_missing_decision: false

workflows:
  - id: animus.organization-meetings/prep-and-followup
    name: Prep and Follow-Up a Meeting
    description: |
      End-to-end per-meeting flow: draft the prep brief, extract action
      items from the raw notes, draft the followup email, contribute a
      weekly-status entry, and flag the meeting for human review.
    phases:
      - pre_brief
      - extract_actions
      - draft_followup
      - synthesize_weekly
      - meeting_flag_for_review
